<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rongo University | PG Director Dashboard</title>
    <link rel="icon" href="../assets/ru1.png">
    <meta name="description" content="Postgraduate Director Dashboard — Rongo University (School of INFOCOMS)" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                200: "#bfdbfe",
                300: "#93c5fd",
                400: "#60a5fa",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
                800: "#1e40af",
                900: "#1e3a8a"
              }
            },
            boxShadow: { soft: "0 10px 25px -10px rgba(2, 6, 23, 0.25)" }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-[var(--ru-bg)] text-slate-900">
    <div class="min-h-screen grid place-items-center p-6">
      <div class="w-full max-w-xl rounded-2xl border border-[#dde1e8] bg-white shadow-soft">
        <div class="p-7 sm:p-9">
          <div class="flex items-center gap-4">
            <img src="/assets/ru.png" alt="R.U logo" class="h-16 w-auto">
            <div>
              <div class="text-sm font-bold text-slate-900">Rongo University — School of INFOCOMS</div>
              <div class="text-xs text-slate-500 font-medium">Postgraduate Director Dashboard</div>
            </div>
          </div>

          <div class="mt-6">
            <div class="text-xl font-semibold tracking-tight">Redirecting to dashboard…</div>
            <div class="mt-2 text-sm text-slate-600">If you are not redirected automatically, use the button below.</div>
          </div>

          <div class="mt-6 flex flex-col sm:flex-row gap-3">
            <a href="./pages/dashboard.html" class="inline-flex items-center justify-center rounded-xl bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-700 transition">
              Open Dashboard
            </a>
            <a href="./pages/pipeline.html" class="inline-flex items-center justify-center rounded-xl border border-slate-200 px-4 py-2.5 text-sm font-semibold text-slate-800 hover:bg-slate-50 transition">
              View Pipeline
            </a>
          </div>

          <div class="mt-6 rounded-xl bg-slate-50 border border-slate-200 p-4">
            <div class="text-xs font-semibold text-slate-700">API base</div>
            <div class="mt-1 text-xs text-slate-600">
              This frontend expects the backend at <span class="font-mono text-slate-900">http://localhost:5000/api</span>.
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.location.replace("./pages/dashboard.html");
    </script>
  </body>
</html>
