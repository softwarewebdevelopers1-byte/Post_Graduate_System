<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .pipeline-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            min-height: 100vh;
        }
        .tracker-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .tracker-header h2 {
            color: #333;
            margin-bottom: 10px;
        }
        .tracker-header p {
            font-size: 1.2rem;
            color: #555;
        }
        .stage {
            width: 350px;
            padding: 15px 20px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            position: relative;
        }
        .stage:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        .stage.active {
            border-color: #007bff;
            background-color: #e7f1ff;
            font-weight: bold;
            color: #004085;
        }
        .stage.completed {
            border-color: #28a745;
            background-color: #d4edda;
            color: #155724;
        }
        .arrow {
            font-size: 24px;
            color: #aaa;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="pipeline-container">
        <div class="tracker-header">
            <h2>Postgraduate Journey Pipeline</h2>
            <p>Current Stage: <strong id="currentStatusDisplay">Loading...</strong></p>
        </div>
        <div id="pipelineStages">
            <!-- Stages will be dynamically generated here -->
        </div>
    </div>
    <script src="pipeline_tracker.js"></script>
</body>
</html>
